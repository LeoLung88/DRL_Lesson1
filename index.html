<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNG HAO WEN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0f172a;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            /* Subtle background pattern */
            background-image: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }

        .clock-wrapper {
            /* Large square centered */
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.03) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            box-shadow:
                0 30px 60px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;

            /* Animation for hover */
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275),
                box-shadow 0.4s ease;
        }

        .clock-wrapper:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow:
                0 40px 80px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .title {
            color: #38bdf8;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 8px;
            margin-bottom: 30px;
            text-transform: uppercase;
            text-shadow: 0 2px 10px rgba(56, 189, 248, 0.3);
        }

        .time {
            color: #ffffff;
            font-size: 84px;
            font-weight: 600;
            letter-spacing: 4px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            font-variant-numeric: tabular-nums;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .colon {
            animation: blink 1s step-start infinite;
            opacity: 1;
            color: #94a3b8;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        .date {
            margin-top: 25px;
            color: #94a3b8;
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        /* Decorative circle behind */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: #38bdf8;
            filter: blur(120px);
            opacity: 0.15;
            z-index: -1;
            border-radius: 50%;
            animation: pulse 8s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.8);
                opacity: 0.1;
            }

            100% {
                transform: scale(1.2);
                opacity: 0.2;
            }
        }
    </style>
</head>

<body>

    <div class="glow"></div>
    <div class="clock-wrapper">
        <div class="title">LUNG HAO WEN</div>
        <div class="time">
            <span id="hours">00</span><span class="colon">:</span><span id="minutes">00</span><span
                class="colon">:</span><span id="seconds">00</span>
        </div>
        <div class="date" id="date">Loading...</div>
    </div>

    <script>
        function updateTaipeiTime() {
            const now = new Date();

            // Format time for Taipei timezone
            const timeOptions = {
                timeZone: 'Asia/Taipei',
                hour12: false,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            };

            // Get parts to inject into span tags individually
            const formatter = new Intl.DateTimeFormat('en-US', timeOptions);
            const parts = formatter.formatToParts(now);

            let hours = '00', minutes = '00', seconds = '00';

            for (const part of parts) {
                if (part.type === 'hour') hours = part.value;
                if (part.type === 'minute') minutes = part.value;
                if (part.type === 'second') seconds = part.value;
            }

            // Handle midnight '24' to '00' if formatting quirk exists
            if (hours === '24') hours = '00';

            document.getElementById('hours').textContent = hours;
            document.getElementById('minutes').textContent = minutes;
            document.getElementById('seconds').textContent = seconds;

            // Format date for Taipei timezone
            const dateOptions = {
                timeZone: 'Asia/Taipei',
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                weekday: 'long'
            };
            const dateString = now.toLocaleDateString('en-US', dateOptions);
            document.getElementById('date').textContent = dateString;
        }

        // Initialize and setup interval
        updateTaipeiTime();
        setInterval(updateTaipeiTime, 1000);
    </script>
</body>

</html>
